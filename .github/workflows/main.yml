Architektura sygnałów dla swing tradingu (2–10 dni)

Na tym horyzoncie najlepiej działają historycznie 4 typy setupów:

1. Volume Breakout — kurs przebija lokalny opór przy wolumenie 2x+ średniej. Jeden z najsilniejszych sygnałów krótkoterminowych.

2. Momentum Surge — silny ruch w ciągu 5 dni na tle rynku (Relative Strength vs WIG20), RSI rosnące ale nie wykupione.

3. Accumulation Setup — OBV rośnie przez kilka dni przy bocznym kursie (smart money wchodzi cicho), potem kurs "odpala".

4. Volatility Squeeze + Expansion — Bollinger Bands bardzo wąskie (cisza przed burzą), potem nagły wzrost wolumenu = sygnał kierunkowy.

Każdy sygnał dostaje punkty (0–100), spółka może łapać kilka sygnałów jednocześnie — score się sumuje i normalizuje.


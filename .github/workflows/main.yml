name: GPW Bot

on:
  schedule:
    - cron: "15 8 * * 1-5"   # 10:15 Warsaw (czas zimowy CET = UTC+1)
    - cron: "0 11 * * 1-5"   # 13:00 Warsaw (czas zimowy)
    - cron: "0 14 * * 1-5"   # 16:00 Warsaw (czas zimowy)
    - cron: "15 7 * * 1-5"   # 10:15 Warsaw (czas letni CEST = UTC+2)
    - cron: "0 10 * * 1-5"   # 13:00 Warsaw (czas letni) - AKTYWNE TERAZ
    - cron: "0 13 * * 1-5"   # 16:00 Warsaw (czas letni) - AKTYWNE TERAZ
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

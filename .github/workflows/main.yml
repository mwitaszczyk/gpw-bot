name: GPW Bot

on:
  schedule:
    - cron: "13 8 * * 1-5"
    - cron: "58 10 * * 1-5"
    - cron: "58 13 * * 1-5"
    - cron: "13 9 * * 1-5"
    - cron: "58 11 * * 1-5"
    - cron: "58 14 * * 1-5"
  workflow_dispatch:          # Ręczne uruchomienie (tylko w dni robocze)

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py

Sprawdzam workflow

Znalazłem błąd. Mamy teraz 18 marca 2026 — zmiana czasu na letni (CEST = UTC+2) nastąpiła 30 marca 2025, więc już od dawna obowiązuje czas letni.

Godziny dla czasu letniego w workflow:

    "15 7 * * 1-5" → 07:15 UTC = 09:15 Warsaw ❌ (za wcześnie)
    "0 10 * * 1-5" → 10:00 UTC = 12:00 Warsaw ❌ (nie 13:00)
    "0 13 * * 1-5" → 13:00 UTC = 15:00 Warsaw ❌ (nie 16:00)

Poprawne godziny dla CEST (UTC+2):

    10:15 Warsaw = 08:15 UTC
    13:00 Warsaw = 11:00 UTC
    16:00 Warsaw = 14:00 UTC

Wejdź w .github/workflows/main.yml na GitHubie, kliknij ołówek i zastąp całą zawartość tym:
yaml

name: GPW Bot

on:
  schedule:
    - cron: "15 8 * * 1-5"   # 10:15 Warsaw (CEST = UTC+2)
    - cron: "0 11 * * 1-5"   # 13:00 Warsaw (CEST = UTC+2)
    - cron: "0 14 * * 1-5"   # 16:00 Warsaw (CEST = UTC+2)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

To jest jedyna zmiana — tylko 3 linie cron zamiast 6, z poprawnymi godzinami UTC. Zrób Commit i jutro rano sprawdź o 10:15.



Przejrzałem kod dokładnie. Masz solidny szkielet, ale jest spory rozdźwięk między założeniami a tym, co faktycznie jest zaimplementowane. Oto diagnoza:

Co działa zgodnie z założeniami:

    ✅ Momentum — mom5 i mom20 są sprawdzane
    ✅ Trend Continuation — filtr close > sma20 > sma50
    ✅ Liquidity Filter — próg 1M PLN średniego obrotu
    ✅ Volume Expansion — wolumen > 1.5x średniej 20d
    ✅ Pre-Breakout (częściowo) — kurs blisko 20d high (close >= 0.98 * high20)

Co jest niezaimplementowane lub błędne:

Smart Money Flow — brak. Nie ma analizy akumulacji (np. OBV, Chaikin Money Flow, czy wzrost ceny przy rosnącym obrocie na przestrzeni kilku dni, nie tylko jednego dnia).

Pre-Breakout — ścieśnienie zmienności — brak. ATR ani Bollinger Bands nie są liczone. Nie wiesz, czy zmienność faktycznie maleje.

Relative Strength — brak. Kod nigdzie nie pobiera indeksu WIG20 ani żadnego benchmarku do porównania.

Scoring jest fikcyjny — każda spółka, która przejdzie filtry, dostaje dokładnie 100 punktów (20+20+10+20+20+10). Score nie różnicuje spółek — sortowanie po score nic nie robi.

RSI — zakres 55–72 jest sensowny, ale nie jest powiązany z żadną logiką "pre-breakout" ani "momentum confirmation". To izolowany filtr.

Chcesz, żebym przepisał kod z pełną implementacją wszystkich 7 sygnałów, w tym prawdziwym scoringiem różnicującym spółki?

